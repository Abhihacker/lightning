<title>Lightning</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0e1119;--panel:#161b27;--panel2:#1d2433;--line:#2a3243;--ivory:#ece6d8;--muted:#8a93a8;--faint:#5d667b;
    --brass:#e9a83c;--brass2:#ffcf6b;--brass-soft:rgba(233,168,60,.14);--brass-line:rgba(233,168,60,.42);
    --teal:#5cae9e;--teal-soft:rgba(92,174,158,.16);--rose:#e0716b;--violet:#9b8cff;--violet-soft:rgba(155,140,255,.13);
    --disp:'Fraunces',Georgia,serif;--body:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
    --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;}
  body{background:var(--ink);color:var(--ivory);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  #app{height:100%;max-width:560px;margin:0 auto;display:flex;flex-direction:column;padding:calc(10px + var(--safe-t)) 16px calc(10px + var(--safe-b));}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;}
  .top{display:flex;align-items:center;gap:9px;padding:4px 2px 8px;flex:none;}
  .top .bolt{width:15px;height:18px;}.top b{font-family:var(--disp);font-weight:700;font-size:17px;}
  .pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 9px;border-radius:99px;border:1px solid var(--brass-line);color:var(--brass);background:var(--brass-soft);}
  .pill.lvl{margin-left:auto;}.pill.learn{color:var(--violet);border-color:var(--violet);background:var(--violet-soft);}
  .dots{display:flex;gap:5px;justify-content:center;padding:2px 0 8px;flex:none;flex-wrap:wrap;}
  .dots i{width:6px;height:6px;border-radius:99px;background:var(--panel2);border:1px solid var(--line);}
  .dots i.done{background:var(--teal);border-color:var(--teal);}.dots i.cur{background:var(--brass);border-color:var(--brass);}
  .stage{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;}
  .num{font-family:var(--mono);font-weight:600;font-size:min(13vw,52px);text-align:center;letter-spacing:.04em;line-height:1.1;}
  .num .d{opacity:.4;transition:opacity .12s,color .12s;}
  .num .d.cur{opacity:1;color:var(--brass);}.num .d.nbr{opacity:1;color:var(--teal);}
  .num .x{color:var(--muted);opacity:.6;margin:0 .1em;}
  .steplabel{text-align:center;margin-top:14px;font-size:15px;color:var(--ivory);min-height:1.4em;line-height:1.5;}
  .steplabel .cur{color:var(--brass);font-family:var(--mono);font-weight:600;}.steplabel .nbr{color:var(--teal);font-family:var(--mono);font-weight:600;}
  .correct{text-align:center;margin-top:8px;font-family:var(--mono);font-size:13px;color:var(--rose);min-height:1.2em;}
  .slots{display:flex;gap:6px;justify-content:center;margin:16px 0 4px;flex-wrap:wrap;}
  .slot{width:42px;height:54px;border-radius:10px;background:var(--panel);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:27px;font-weight:600;transition:.12s;}
  .slot.active{border-color:var(--brass);background:var(--brass-soft);}.slot.filled{border-color:var(--teal);color:var(--ivory);}
  .hint{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;}
  .hintline{text-align:center;color:var(--faint);font-size:12.5px;margin-top:12px;min-height:1em;}
  .result{text-align:center;}
  .result .verdict{font-family:var(--disp);font-weight:600;font-size:32px;}
  .result .verdict.ok{color:var(--teal);}.result .verdict.no{color:var(--rose);}.result .verdict.slip{color:var(--ivory);}
  .pr{display:inline-block;margin-top:6px;font-family:var(--mono);font-weight:700;color:var(--brass2);font-size:14px;}
  .bigtime{font-family:var(--mono);font-weight:700;font-size:44px;margin-top:14px;line-height:1;}
  .split{font-family:var(--mono);font-size:12.5px;color:var(--faint);margin-top:8px;}.split b{color:var(--muted);}
  .gateline{font-family:var(--mono);font-size:12.5px;color:var(--muted);margin-top:10px;}
  .ca{font-family:var(--mono);font-size:15px;color:var(--rose);margin-top:10px;}
  .subtle{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:10px;}
  .foot{flex:none;padding-top:10px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:linear-gradient(180deg,var(--brass2),var(--brass));color:#23170a;font-weight:600;padding:16px;border-radius:13px;font-size:16px;border:none;font-family:var(--body);cursor:pointer;}
  .btn:active{filter:brightness(.96);transform:translateY(1px);}
  .btn.ghost{background:var(--panel2);color:var(--muted);border:1px solid var(--line);font-weight:500;font-size:13px;padding:10px;margin-top:9px;}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .key{height:56px;border-radius:13px;background:var(--panel);border:1px solid var(--line);color:var(--ivory);font-family:var(--mono);font-size:24px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .key:active{background:var(--panel2);transform:translateY(1px);}.key.fn{font-size:15px;color:var(--muted);font-family:var(--body);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;}
  .card h1{font-family:var(--disp);font-weight:600;font-size:24px;margin:0 0 8px;letter-spacing:-.01em;}.card h1.big{font-size:27px;}
  .card p{color:var(--muted);font-size:14px;line-height:1.6;margin:0 0 12px;}.card p b{color:var(--ivory);}
  .plan{display:flex;flex-direction:column;gap:7px;margin:8px 0 4px;}
  .prow{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;}
  .prow .r{color:var(--brass);}.prow .k{color:var(--faint);font-size:11px;}
  .statline{display:flex;gap:9px;margin:14px 0;}
  .statline .s{flex:1;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 4px;}
  .statline .s b{font-family:var(--mono);font-size:20px;display:block;}.statline .s span{font-size:10.5px;color:var(--muted);}
  .err{color:var(--rose);font-family:var(--mono);font-size:13px;text-align:center;}
  .env{margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--faint);line-height:1.7;word-break:break-all;border-top:1px solid var(--line);padding-top:12px;}
  .env b{color:var(--teal);}
</style>

      ${slotsLR(cur.ansDigits,entered)}<div class="hintline">clock’s stopped — a typo here is just discarded</div>`;
  } else if(phase==='result'){ const r=lastR;
    if(r.outcome==='clean'){
      stage=`<div class="result"><div class="verdict ok">Correct</div>
        ${r.gate&&r.total*1000<=r.gate?'<div class="pr">✓ under target</div>':''}
        <div class="bigtime">${r.total.toFixed(2)}s</div>
        <div class="split">thought <b>${r.think.toFixed(2)}s</b> · typed <b>${r.entry.toFixed(2)}s</b></div>
        <div class="gateline">target ≤ ${(r.gate/1000).toFixed(2)}s</div></div>`;
    } else if(r.outcome==='slip'){
      stage=`<div class="result"><div class="verdict slip">Correct ✓</div><div class="subtle">caught a slip — not timed, so your speed stays honest.</div></div>`;
    } else {
      stage=`<div class="result"><div class="verdict no">Missed</div><div class="ca">${cur.problem.n!=null?cur.problem.n:cur.problem.a} × ${cur.problem.b!=null?cur.problem.b:L.RULE_MATH[cur.rule].mult} = ${r.ans}</div>
        <div class="subtle">your answer: ${r.got} · counts as a miss</div></div>`;
    }
  }
  $().innerHTML = topbar()+dots()+`<div class="stage">${stage}</div>`+foot();
}
function foot(){
  if(phase==='step')  return pad('pressStep',false);
  if(phase==='enter') return pad('press',true);
  if(phase==='retry') return pad('press',true)+`<button class="btn ghost" onclick="missedIt()">I actually missed it</button>`;
  if(phase==='stepdone') return `<div class="foot"><button class="btn" onclick="afterStep()">Next →</button></div>`;
  if(phase==='compute')  return `<div class="foot"><button class="btn" onclick="gotIt()">I’ve got it →</button></div>`;
  if(phase==='result')   return `<div class="foot"><button class="btn" onclick="advance()">Next →</button></div>`;
  return '';
}
function pad(name,withBack){ return `<div class="foot"><div class="pad">
  ${[1,2,3,4,5,6,7,8,9].map(d=>`<button class="key" onclick="${name}('${d}')">${d}</button>`).join('')}
  ${withBack?'<button class="key fn" onclick="backspace()">⌫</button>':'<button class="key fn" style="visibility:hidden">.</button>'}
  <button class="key" onclick="${name}('0')">0</button><button class="key fn" style="visibility:hidden">.</button></div></div>`; }

function renderPlan(){ const s=planInfo.summary; const q=(cond&&cond._state)?null:null;
  const intro = s.introducing ? `Introducing <b>${RN[s.introducing]}</b> today — you’ll learn it step by step first.` : '';
  const rows = summarizeQueue();
  $().innerHTML = `<div class="top">${BOLT}<b>Lightning</b></div><div class="stage"><div class="card">
    <h1 class="big">Today’s session</h1>
    <p>${planInfo.len} problems, chosen from your history. ${intro}</p>
    <div class="plan">${rows}</div>
    <div class="env">origin: <b>${planInfo.origin}</b><br>stored history: <b>${planInfo.dbCount}</b> attempts in this database</div>
  </div></div><div class="foot"><button class="btn" onclick="begin()">Begin →</button></div>`;
}
function summarizeQueue(){
  const st=planInfo.summary;
  const parts=[];
  if(st.coldProbes&&st.coldProbes.length) parts.push(['cold check', st.coldProbes.map(r=>RN[r]).join(', '), 'resurface']);
  if(st.learning&&st.learning.length) parts.push(['practice', st.learning.map(r=>RN[r]).join(', '), 'frontier']);
  if(st.introducing) parts.push(['learn', RN[st.introducing], 'new rule']);
  if(st.fluentRules&&st.fluentRules.length) parts.push(['review', st.fluentRules.map(r=>RN[r]).join(', '), 'keep sharp']);
  if(!parts.length) parts.push(['practice','×11','start here']);
  return parts.map(([k,r,note])=>`<div class="prow"><span><span class="r">${r}</span> <span class="k">· ${note}</span></span><span class="k">${k}</span></div>`).join('');
}
function renderDone(){ const sm=cond.summary();
  const rules=Object.entries(sm.byRule).map(([r,n])=>`${RN[r]}×${n}`).join('  ');
  $().innerHTML = `<div class="top">${BOLT}<b>Lightning</b></div><div class="stage"><div class="card">
    <h1 class="big">Session complete ⚡</h1>
    <p>You worked through <b>${sm.solved}</b> problems. The next session will build on what you just did.</p>
    <div class="statline"><div class="s"><b class="mono">${sm.solved}</b><span>solved</span></div>
      <div class="s"><b class="mono">${Object.keys(sm.byRule).length}</b><span>rules</span></div>
      <div class="s"><b class="mono">${sm.byKind.frontier||0}</b><span>practice</span></div></div>
    <p style="color:var(--faint);font-size:13px">${rules}</p>
  </div></div><div class="foot"><button class="btn" onclick="init()">Done</button></div>`;
}
function renderError(e){ $().innerHTML=`<div class="top">${BOLT}<b>Lightning</b></div><div class="stage"><div class="card">
  <h1>Storage unavailable</h1><p class="err">${(e&&e.message)||e}</p>
  <p>If you’re in Private Browsing, switch to a normal Safari tab.</p></div></div>`; }

Object.assign(window,{init,begin,serve,pressStep,afterStep,gotIt,press,backspace,missedIt,advance});
if(document.getElementById('app')) init();
</script>
</body>
</html>
